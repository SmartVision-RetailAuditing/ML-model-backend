name: deploy pipeline
on:
  push:
    branches:
      - "main"
      - "acceptance"

permissions:
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            smartvisionretailauditing/mlmodel:latest
            smartvisionretailauditing/mlmodel:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: create env file
      run: |
        rm -f ./stack.env
        printf '%s\n' \
          'AZURE_BLOB_CONNECTION_STRING=${{ secrets.AZURE_BLOB_CONNECTION_STRING }}' \
          'USE_AZURE=${{ secrets.USE_AZURE }}' \
          'AZURE_BLOB_CONTAINER_NAME=${{ secrets.AZURE_BLOB_CONTAINER_NAME }}' \
          'YOLO_CONF=${{ secrets.YOLO_CONF }}' \
          'YOLO_IOU=${{ secrets.YOLO_IOU }}' \
          'CONFIDENCE_THRESHOLD=${{ secrets.CONFIDENCE_THRESHOLD }}' \
          'OCR_FALLBACK_THRESHOLD=${{ secrets.OCR_FALLBACK_THRESHOLD }}' \
          'EDGE_TOLERANCE=${{ secrets.EDGE_TOLERANCE }}' \
          'SHELF_THRESHOLDS=${{ secrets.SHELF_THRESHOLDS }}' \
          > ./stack.env

    - name: Docker Stack Deploy
      uses: cssnr/stack-deploy-action@v1
      with:
        name: deploystack
        file: docker-stack.yml
        host: ${{ secrets.VPS_HOST }}
        user: deploy
        ssh_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        env_file: ./stack.env
