services:
  model:
    image: smartvisionretailauditing/mlmodel:latest
    ports:
      - 8000:8000
    volumes:
      - /home/deploy/models:/app/models  # host path : container path
      - /home/deploy/.env:/app/.env:ro  # host path : container path
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always
