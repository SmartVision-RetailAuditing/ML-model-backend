services:
  model:
    image: smartvisionretailauditing/mlmodel:latest
    ports:
      - 8000:8000
    volumes:
      - /home/deploy/models:/app/models  # host path : container path
      - /home/deploy/.env:/app/.env:ro  # host path : container path
    command: nvidia-smi
    deploy:
      placement:
        constraints:
          - node.labels.gpu == true
      resources:
        reservations:
          generic_resources:
            - discrete_resource_spec:
                kind: 'NVIDIA-GPU'
                value: 0
    restart: always
